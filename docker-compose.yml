name: minigram

services:
  chats-service:
    build: .
    container_name: minigram-chats-service
    depends_on:
      postgres-chats:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      DB_HOST: postgres-chats
      DB_PORT: ${CHATS_DB_PORT:-5432}
      DB_NAME: ${CHATS_DB_NAME:-minigram_chats}
      DB_USERNAME: ${CHATS_DB_USER:-minigram}
      DB_PASSWORD: ${CHATS_DB_PASSWORD:-minigram}
      SPRING_PROFILES_ACTIVE: ${CHATS_SPRING_PROFILES:-pg}
    ports:
      - "${CHATS_SERVICE_PORT:-8080}:8080"
    networks:
      - minigram
    restart: unless-stopped

  postgres-chats:
    image: postgres:18.3
    container_name: minigram-postgres-chats
    environment:
      POSTGRES_DB: ${CHATS_DB_NAME:-minigram_chats}
      POSTGRES_USER: ${CHATS_DB_USER:-minigram}
      POSTGRES_PASSWORD: ${CHATS_DB_PASSWORD:-minigram}
    ports:
      - "${CHATS_DB_PORT:-5432}:5432"
    volumes:
      - postgres_chats_data:/var/lib/postgresql
    networks:
      - minigram
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CHATS_DB_USERNAME:-minigram} -d ${CHATS_DB_NAME:-minigram_chats}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_chats_data:

networks:
  minigram:
