spring:
  datasource:
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  jwt:
    secret: test-jwt-secret-key-that-is-long-enough-for-hmac-sha256-algorithm
    issuer: Minigram
    audience: MinigramClient

  services:
    profile: http://localhost:5001
